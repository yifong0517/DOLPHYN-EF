# HiGHS Solver Parameters
# Common solver settings
Feasib_Tol: 1.0e-6      # Primal feasibility tolerance # [type: double, advanced: false, range: [1e-10, inf], default: 1e-07]
Optimal_Tol: 1.0e-6     # Dual feasibility tolerance # [type: double, advanced: false, range: [1e-10, inf], default: 1e-07]
TimeLimit: 43200        # Time limit # [type: double, advanced: false, range: [0, inf], default: inf]
Pre_Solve: "choose"     # Presolve option: "off", "choose" or "on" # [type: string, advanced: false, default: "choose"]
Method: "choose"        # HiGHS-specific solver settings # Solver option: "simplex", "choose" or "ipm" # [type: string, advanced: false, default: "choose"]

# HiGHS-specific solver settings
run_crossover: "choose" # Run IPM crossover: "off", "choose" or "on" [type: string, advanced: false, default: "on"]

# Log file
log_file: ""            # [type: string, advanced: false, default: ""]
